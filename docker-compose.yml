version: '3.8'

services:
  orion_core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: the_godbrain_vault
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Orion Environment Vars
    volumes:
      # DIRECT BIND MOUNT VOOR MAXIMALE SNELHEID (Geen encryptie-overhead meer)
      - ./packages/database:/app/packages/database
    networks:
      - orion_isolated_network
    # Prevent the container from getting root access to host via kernel exploits
    security_opt:
      - no-new-privileges:true
    # GEEN CPU/RAM LIMIETEN MEER: Orion krijgt volledige toegang tot beschikbare rekenkracht voor RAW SPEED.

networks:
  # Een speciaal afgeschermd netwerk. Orion kan via dit netwerk het internet op ('open claw' scrapen), 
  # maar externe machines kunnen niet naar binnen, behalve via poort 3000.
  orion_isolated_network:
    driver: bridge
