services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ryl-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ryl_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ryl_secure_2026}
      POSTGRES_DB: rebuildyourlife
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ryl_admin -d rebuildyourlife"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
