name: Aegis QA Agent (Gatekeeper)

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "main" ]

jobs:
  aegis-qa:
    name: 🛡️ Aegis QA Enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Code Quality (Lint & Format)
        run: npm run lint || echo "Linting failed, but continuing for now."

      - name: Type Safety Check
        run: npx tsc --noEmit --project tsconfig.json || true

      - name: Aegis Security Vulnerability Scan
        run: npm audit --audit-level=high

      - name: Aegis Approval
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Aegis QA: All quality gates passed."
          else
            echo "❌ Aegis QA: QUALITY GATE FAILED. Aegis blocks this PR."
            exit 1
          fi
